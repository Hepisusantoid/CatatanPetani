<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#08041e">
<title>Admin Panel — Catatan Petani</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Ccircle cx='24' cy='24' r='23' fill='%23150d3a' stroke='%23FF9F0A' stroke-width='2'/%3E%3Cpath d='M12 24h20M22 14l10 10-10 10' stroke='%23FF9F0A' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06031a;--bg2:#100848;--bg3:#1e0d6b;
  --glass:rgba(255,255,255,.08);--glass2:rgba(255,255,255,.13);
  --border:rgba(255,255,255,.14);
  --t1:#F8FAFC;--t2:rgba(248,250,252,.6);--t3:rgba(248,250,252,.35);
  --green:#30D158;--orange:#FF9F0A;--red:#FF453A;--blue:#60A5FA;--purple:#BF5AF2;--gold:#FFD60A;
  --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;color:var(--t1);-webkit-font-smoothing:antialiased;}
body{background:radial-gradient(ellipse at 20% 0%,rgba(72,20,180,.5),transparent 50%),radial-gradient(ellipse at 80% 85%,rgba(48,209,88,.1),transparent 40%),linear-gradient(170deg,var(--bg) 0%,var(--bg2) 50%,var(--bg3) 100%);background-attachment:fixed;min-height:100vh;}
#app{max-width:680px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.glass{background:var(--glass);backdrop-filter:blur(28px) saturate(170%);-webkit-backdrop-filter:blur(28px) saturate(170%);border:1px solid var(--border);position:relative;}
.glass::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(255,255,255,.2);border-radius:inherit;pointer-events:none;}

/* Loading */
#s-load{flex:1;display:flex;align-items:center;justify-content:center;}
.spin{width:40px;height:40px;border-radius:50%;border:3px solid rgba(255,255,255,.15);border-top-color:var(--orange);animation:sp .9s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

/* Login */
#s-login{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;gap:18px;}
.admin-badge{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;background:rgba(255,159,10,.15);border:2px solid rgba(255,159,10,.35);}
#s-login h1{font-size:24px;font-weight:800;letter-spacing:-.4px;}
#s-login .sub{font-size:14px;color:var(--t2);line-height:1.5;max-width:280px;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#1f1f1f;font-weight:600;font-size:15px;border:none;border-radius:12px;padding:14px 22px;width:100%;max-width:260px;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.25);}
.btn-google:active{transform:scale(.97);}
.access-denied{background:rgba(255,69,58,.12);border:1px solid rgba(255,69,58,.25);border-radius:14px;padding:16px 20px;display:none;max-width:300px;}
.access-denied h3{color:var(--red);font-size:16px;margin-bottom:6px;}
.access-denied p{color:var(--t2);font-size:13px;line-height:1.5;}

/* Main */
#s-main{flex:1;display:none;flex-direction:column;}
header{background:rgba(8,4,30,.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:max(14px,env(safe-area-inset-top,14px)) 16px 14px;position:sticky;top:0;z-index:10;}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-brand h1{font-size:18px;font-weight:800;letter-spacing:-.3px;}
.hdr-badge{font-size:9px;font-weight:800;background:rgba(255,159,10,.2);color:var(--orange);border:1px solid rgba(255,159,10,.3);border-radius:20px;padding:2px 8px;text-transform:uppercase;letter-spacing:.06em;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.admin-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,159,10,.4);}
.btn-logout{font-size:12px;font-weight:600;color:var(--t2);background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;}
.btn-logout:active{background:rgba(255,69,58,.15);color:var(--red);}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(8,4,30,.6);padding:0 14px;}
.tab-btn{padding:12px 14px;font-size:13px;font-weight:600;color:var(--t2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;transition:all .15s;}
.tab-btn.active{color:var(--orange);border-bottom-color:var(--orange);}

/* Content */
#content{flex:1;padding:16px 14px 60px;display:flex;flex-direction:column;gap:12px;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-card{border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden;}
.stat-lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.stat-val{font-size:28px;font-weight:800;letter-spacing:-.6px;line-height:1;}
.stat-sub{font-size:11px;color:var(--t2);margin-top:4px;}
.sv-g{color:var(--green);}.sv-o{color:var(--orange);}.sv-b{color:var(--blue);}.sv-p{color:var(--purple);}

/* Section */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-title{font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;}
.sec-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--glass);border:1px solid var(--border);}

/* User card */
.user-card{border-radius:var(--r);overflow:hidden;margin-bottom:0;}
.user-head{display:flex;align-items:center;gap:11px;padding:13px 14px;cursor:pointer;}
.user-head:active{background:rgba(255,255,255,.06);}
.user-av{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--t1);}
.user-info{flex:1;min-width:0;}
.user-name{font-size:14px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-email{font-size:11.5px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-stats{display:flex;gap:8px;flex-shrink:0;}
.us{display:flex;flex-direction:column;align-items:center;}
.us-v{font-size:15px;font-weight:800;color:var(--t1);}
.us-l{font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;}
.user-chev{color:var(--t3);font-size:16px;transition:transform .2s;}
.user-card.open .user-chev{transform:rotate(180deg);}
.user-body{display:none;border-top:1px solid rgba(255,255,255,.07);padding:12px 14px;}
.user-card.open .user-body{display:block;}
.user-detail-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.user-detail-row:last-child{border-bottom:none;}
.ud-ico{font-size:16px;flex-shrink:0;}
.ud-info{flex:1;min-width:0;}
.ud-name{font-size:13px;font-weight:600;color:var(--t1);}
.ud-sub{font-size:11px;color:var(--t2);margin-top:1px;}
.cat-chip{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin:2px 3px 2px 0;}
.chip-g{background:rgba(48,209,88,.18);color:var(--green);}
.chip-o{background:rgba(255,159,10,.18);color:var(--orange);}
.chip-b{background:rgba(96,165,250,.18);color:var(--blue);}
.chip-p{background:rgba(191,90,242,.18);color:var(--purple);}
.chip-d{background:rgba(255,255,255,.1);color:var(--t2);}
.last-seen{font-size:10px;color:var(--t3);margin-top:4px;}

/* Chart */
.chart-wrap{border-radius:var(--r);padding:14px;}
.chart-title{font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:100px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-fill{width:100%;border-radius:4px 4px 0 0;min-height:2px;transition:height .3s ease;}
.bar-lbl{font-size:9px;color:var(--t3);text-align:center;line-height:1.2;}
.bar-val{font-size:10px;font-weight:700;color:var(--t1);}
.crop-dist{display:flex;flex-direction:column;gap:6px;}
.dist-row{display:flex;align-items:center;gap:8px;}
.dist-lbl{font-size:12px;font-weight:600;color:var(--t1);width:90px;flex-shrink:0;}
.dist-bar-wrap{flex:1;height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;}
.dist-bar{height:100%;border-radius:4px;}
.dist-num{font-size:11px;font-weight:700;color:var(--t2);width:24px;text-align:right;flex-shrink:0;}

/* Active crop (same as jadwal) */
.crop-card{border-radius:var(--r);padding:13px 14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);}
.crop-top{display:flex;gap:10px;margin-bottom:8px;}
.crop-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:1px solid rgba(255,255,255,.1);}
.ci-g{background:rgba(48,209,88,.2);}.ci-o{background:rgba(255,159,10,.2);}.ci-p{background:rgba(191,90,242,.2);}.ci-d{background:rgba(255,255,255,.1);}
.crop-meta{flex:1;min-width:0;}
.crop-origin{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.crop-name-t{font-size:14px;font-weight:700;color:var(--t1);letter-spacing:-.2px;}
.crop-owner{font-size:11px;color:var(--blue);margin-top:2px;}
.crop-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.fase-badge{font-size:9px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.fb-v{background:rgba(96,165,250,.2);color:var(--blue);border:1px solid rgba(96,165,250,.25);}
.fb-g{background:rgba(191,90,242,.2);color:var(--purple);border:1px solid rgba(191,90,242,.25);}
.fb-b{background:rgba(255,159,10,.2);color:var(--orange);border:1px solid rgba(255,159,10,.25);}
.fb-p{background:rgba(48,209,88,.2);color:var(--green);border:1px solid rgba(48,209,88,.25);}
.crop-age{font-size:13px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.crop-age span{font-size:10px;color:var(--t3);font-weight:500;}
.prog-wrap{height:4px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;}

/* Drill-down hierarchy */
.drilldown{padding:12px 14px;border-top:1px solid rgba(255,255,255,.07);}
.cat-block{margin-bottom:14px;}
.cat-block:last-child{margin-bottom:0;}
.cat-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.cat-hd-ico{font-size:18px;}
.cat-hd-name{font-size:13px;font-weight:800;color:var(--t1);letter-spacing:-.1px;}
.cat-hd-cnt{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:rgba(255,255,255,.08);color:var(--t2);}
.season-block{margin-left:10px;margin-bottom:10px;border-left:2px solid rgba(255,255,255,.1);padding-left:12px;}
.season-hd{font-size:12px;font-weight:700;color:var(--orange);margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.season-hd::before{content:'📅';font-size:11px;}
.lahan-block{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.lahan-block:last-child{margin-bottom:0;}
.lahan-hd-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.lahan-hd-name{font-size:13px;font-weight:700;color:var(--t1);}
.lahan-hd-luas{font-size:10px;font-weight:700;background:rgba(96,165,250,.18);color:var(--blue);padding:2px 7px;border-radius:20px;margin-left:5px;}
.lahan-hd-status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0;}
.ls-panen{background:rgba(48,209,88,.18);color:var(--green);}
.ls-aktif{background:rgba(255,159,10,.18);color:var(--orange);}
.lahan-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:7px;}
.lahan-meta-item{font-size:11px;color:var(--t2);}
.lahan-meta-item strong{color:var(--t1);}
.lahan-hasil-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
.lh-box{background:rgba(48,209,88,.08);border:1px solid rgba(48,209,88,.15);border-radius:8px;padding:6px 8px;}
.lh-box-l{font-size:9px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.lh-box-v{font-size:12px;font-weight:800;color:#fff;}
.perawatan-hd{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.log-compact{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.log-compact:last-child{border-bottom:none;}
.lc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.lc-g{background:var(--green);}.lc-o{background:var(--orange);}.lc-b{background:var(--blue);}
.lc-jenis{font-size:12px;font-weight:600;color:var(--t1);}
.lc-meta{font-size:10px;color:var(--t3);margin-top:1px;}
.more-logs{font-size:10px;color:var(--t3);font-style:italic;padding-top:4px;}
.no-data{font-size:11px;color:var(--t3);font-style:italic;padding:4px 0;}
.user-email-row{display:flex;align-items:center;gap:5px;margin-top:2px;}
.uid-copy{font-size:9px;background:rgba(255,255,255,.08);color:var(--t3);padding:1px 6px;border-radius:4px;cursor:pointer;border:none;font-family:inherit;}
.uid-copy:active{background:rgba(48,209,88,.2);color:var(--green);}
.empty{text-align:center;padding:44px 20px;color:var(--t2);}
.empty .em{font-size:40px;margin-bottom:10px;}
.empty p{font-size:13px;line-height:1.5;}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(20,15,45,.92);color:var(--t1);padding:12px 20px;border-radius:30px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:50;border:1px solid var(--border);white-space:nowrap;max-width:90%;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">
  <!-- Loading -->
  <div id="s-load"><div class="spin"></div></div>

  <!-- Login -->
  <div id="s-login" style="display:none">
    <div class="admin-badge">🛡️</div>
    <h1>Admin Panel</h1>
    <p class="sub">Masuk dengan akun Google yang terdaftar sebagai admin Catatan Petani.</p>
    <button class="btn-google" id="btn-login">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.56 2.7-3.87 2.7-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.55-1.84.87-3.06.87-2.36 0-4.36-1.6-5.07-3.75H.92v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.93 10.68A5.4 5.4 0 0 1 3.64 9c0-.58.1-1.16.29-1.68V4.99H.92A9 9 0 0 0 0 9c0 1.45.35 2.83.92 4.01l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .92 4.99l3.01 2.33C4.64 5.18 6.64 3.58 9 3.58z"/></svg>
      Masuk dengan Google
    </button>
    <div class="access-denied" id="denied">
      <h3>🚫 Akses Ditolak</h3>
      <p>Akun ini tidak terdaftar sebagai admin. Pastikan kamu login dengan akun Google yang benar.</p>
    </div>
  </div>

  <!-- Main Admin -->
  <div id="s-main">
    <header>
      <div class="hdr-inner">
        <div class="hdr-brand">
          <div>
            <div style="display:flex;align-items:center;gap:8px;">
              <h1>Admin Panel</h1>
              <span class="hdr-badge">Catatan Petani</span>
            </div>
            <div id="hdr-sub" style="font-size:11px;color:var(--t2);margin-top:2px;"></div>
          </div>
        </div>
        <div class="hdr-right">
          <img class="admin-avatar" id="admin-avatar" src="" alt="">
          <button class="btn-logout" id="btn-logout">Keluar</button>
        </div>
      </div>
    </header>
    <div class="tabs">
      <button class="tab-btn active" id="tab-overview" onclick="switchTab('overview')">📊 Overview</button>
      <button class="tab-btn" id="tab-funnel" onclick="switchTab('funnel')">🔻 Funnel</button>
      <button class="tab-btn" id="tab-users" onclick="switchTab('users')">👤 Pengguna</button>
      <button class="tab-btn" id="tab-active" onclick="switchTab('active')">🌱 Tanaman Aktif</button>
    </div>
    <div id="content"></div>
  </div>

  <div id="toast"></div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getAuth,GoogleAuthProvider,signInWithPopup,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import{getDatabase,ref,onValue,get}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ── Config Firebase ───────────────────────
let fbCfg;
try{
  const r=await fetch('/api/firebase-config');
  if(!r.ok)throw new Error('Status '+r.status);
  fbCfg=await r.json();
}catch(e){
  el('s-load').innerHTML='<p style="padding:24px;text-align:center;color:#F8FAFC;font-size:14px;line-height:1.6">Gagal memuat config Firebase: '+e.message+'</p>';
  throw e;
}

// ── Admin UID dari env Vercel ─────────────
let ADMIN_UID;
try{
  const r=await fetch('/api/admin-uid');
  const d=await r.json();
  if(!r.ok||!d.adminUid)throw new Error(d.error||'ADMIN_UID kosong');
  ADMIN_UID=d.adminUid;
}catch(e){
  el('s-load').innerHTML='<p style="padding:24px;text-align:center;color:#F8FAFC;font-size:14px;line-height:1.6">⚙️ Gagal memuat konfigurasi admin:<br><strong>'+e.message+'</strong><br><br>Pastikan variabel <code style="background:rgba(255,255,255,.1);padding:2px 8px;border-radius:6px">ADMIN_UID</code> sudah diatur di Vercel → Project Settings → Environment Variables, lalu redeploy.</p>';
  throw e;
}
const app=initializeApp(fbCfg);
const auth=getAuth(app);
const db=getDatabase(app);
const provider=new GoogleAuthProvider();

const el=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const fmtRp=n=>{const v=parseFloat(n)||0;if(v>=1e9)return'Rp '+(v/1e9).toFixed(1)+' M';if(v>=1e6)return'Rp '+(v/1e6).toFixed(1)+' Jt';return'Rp '+Math.round(v).toLocaleString('id-ID');};
const fmtTgl=ts=>{if(!ts)return'—';return new Date(ts).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});};
const todayStr=()=>new Date().toISOString().split('T')[0];
const hss=(tanam)=>{if(!tanam)return 0;return Math.max(0,Math.floor((new Date()-new Date(tanam+'T00:00:00'))/864e5));};

let allData={};
let currentTab='overview';
let dataUnsub=null;
let toastTimer;
function toast(m){const t=el('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2600);}

// ── Auth ──────────────────────────────────
el('btn-login').addEventListener('click',async()=>{
  try{await signInWithPopup(auth,provider);}
  catch(e){toast('Login gagal: '+(e.code||e.message));}
});

onAuthStateChanged(auth,user=>{

function loadAllData(){

    const uidCount=Object.keys(allData).length;
    el('hdr-sub').textContent=`${uidCount} pengguna terdaftar`;
  });

// ── Stats Compute ─────────────────────────
function computeStats(){
  let totalUsers=0,totalCats=0,totalSeasons=0,totalLahans=0,totalActive=0,totalPerawatan=0,totalPanen=0,totalPendapatan=0;
  const cropCount={};
  const recentUsers=[];
  const activeLahans=[];

  Object.entries(allData).forEach(([uid,ud])=>{
    if(!ud)return;
    totalUsers++;
    const profile=ud.profile||{};
    recentUsers.push({uid,profile,lastSeen:profile.lastSeen||0});

    // categories
    const cats=ud.categories||{};
    totalCats+=Object.keys(cats).length;
    Object.values(cats).forEach(c=>{
      const n=(c.name||'').toLowerCase();
      if(n.includes('padi'))cropCount['Padi']=(cropCount['Padi']||0)+1;
      else if(n.includes('jagung'))cropCount['Jagung']=(cropCount['Jagung']||0)+1;
      else if(n.includes('cabai'))cropCount['Cabai']=(cropCount['Cabai']||0)+1;
      else if(n.includes('tomat'))cropCount['Tomat']=(cropCount['Tomat']||0)+1;
      else if(n.includes('bawang'))cropCount['Bawang']=(cropCount['Bawang']||0)+1;
      else if(n.includes('singkong'))cropCount['Singkong']=(cropCount['Singkong']||0)+1;
      else if(n.includes('talas'))cropCount['Talas']=(cropCount['Talas']||0)+1;
      else cropCount['Lainnya']=(cropCount['Lainnya']||0)+1;
    });

    // seasons
    const seasons=ud.seasons||{};
    Object.values(seasons).forEach(catSeasons=>{
      totalSeasons+=Object.keys(catSeasons).length;
    });

    // lahans
    const lahans=ud.lahans||{};
    Object.values(lahans).forEach(seasonLahans=>{
      Object.entries(seasonLahans).forEach(([lid,l])=>{
        totalLahans++;
        totalPendapatan+=parseFloat(l.pendapatan)||0;
        if(l.panen)totalPanen++;
        if(l.tanam&&!l.panen){
          totalActive++;
          // find cat name for this lahan
          let catName='',catIcon='📦';
          Object.values(cats).forEach(c=>{catName=c.name||'';catIcon=c.icon||'📦';});
          activeLahans.push({uid,profile,lahanId:lid,lahan:l,catName,catIcon});
        }
      });
    });

    // perawatan
    const perawatan=ud.perawatan||{};
    Object.values(perawatan).forEach(logs=>{
      totalPerawatan+=Object.keys(logs).length;
    });
  });

  recentUsers.sort((a,b)=>b.lastSeen-a.lastSeen);
  return{totalUsers,totalCats,totalSeasons,totalLahans,totalActive,totalPerawatan,totalPanen,totalPendapatan,cropCount,recentUsers,activeLahans};
}

// ── Tab Switching ─────────────────────────
window.switchTab=function(tab){
  currentTab=tab;

function renderCurrentTab(){

// ── Funnel ─────────────────────────────────
const FUNNEL_STEPS=[
  {key:'login_berhasil',label:'Login Berhasil'},
  {key:'tutorial_dibuka',label:'Buka Tutorial'},
  {key:'kategori_dibuat',label:'Buat Kategori Tanaman'},
  {key:'musim_dibuat',label:'Buat Musim Tanam'},
  {key:'lahan_ditambahkan',label:'Tambah Lahan'},
  {key:'catatan_kegiatan_pertama',label:'Catat Kegiatan Pertama'}
];
function computeFunnel(){
  const counts={};FUNNEL_STEPS.forEach(s=>counts[s.key]=new Set());
  Object.entries(allData).forEach(([uid,ud])=>{
    if(!ud)return;
    const events=ud.events||{};
    const seen=new Set();
    Object.values(events).forEach(e=>{if(e&&e.name)seen.add(e.name);});
    FUNNEL_STEPS.forEach(s=>{if(seen.has(s.key))counts[s.key].add(uid);});
  });
  return FUNNEL_STEPS.map(s=>({...s,count:counts[s.key].size}));
}
function renderFunnel(){
  const c=el('content');c.innerHTML='';
  const rows=computeFunnel();
  const maxVal=Math.max(1,rows[0]?.count||1);
  const wrap=document.createElement('div');
  wrap.className='chart-wrap glass';
  wrap.style.borderRadius='var(--r)';
  const totalUsers=Object.keys(allData).length;
  wrap.innerHTML=`<div class="chart-title">🔻 Funnel Pengguna (${totalUsers} akun terdaftar)</div>
    <div style="font-size:11.5px;color:var(--t2);margin-bottom:14px;line-height:1.5;">Menunjukkan berapa akun yang pernah mencapai tiap langkah. Selisih besar antara dua baris = titik orang paling banyak berhenti.</div>
    <div class="crop-dist">${rows.map((r,i)=>{
      const pct=totalUsers?Math.round(r.count/totalUsers*100):0;
      const dropFromPrev=i>0?rows[i-1].count-r.count:0;
      return`<div class="dist-row">
        <div class="dist-lbl">${i+1}. ${r.label}</div>
        <div class="dist-bar-wrap"><div class="dist-bar" style="width:${Math.round(r.count/maxVal*100)}%;background:#60A5FA;"></div></div>
        <div class="dist-num">${r.count} <span style="color:var(--t3);font-weight:500;">(${pct}%)</span></div>
      </div>${i>0&&dropFromPrev>0?`<div style="font-size:10.5px;color:var(--red,#FF453A);padding:2px 0 6px 4px;">↓ ${dropFromPrev} berhenti di sini</div>`:''}`;
    }).join('')}</div>`;
  c.appendChild(wrap);
  if(!totalUsers){
    c.innerHTML+='<div class="empty"><div class="em">📭</div><p>Belum ada data event. Funnel akan terisi begitu pengguna mulai memakai aplikasi versi terbaru.</p></div>';
    return;
  }
  // Detail per-pengguna
  const detWrap=document.createElement('div');
  detWrap.style.marginTop='14px';
  detWrap.innerHTML=`<div class="sec-hd"><span class="sec-title">👤 Progres per Pengguna</span></div>`;
  const userRows=Object.entries(allData).map(([uid,ud])=>{
    if(!ud)return null;
    const p=ud.profile||{};
    const events=ud.events||{};
    const namesSeen=new Set();
    let lastTs=0;
    Object.values(events).forEach(e=>{if(e&&e.name){namesSeen.add(e.name);if(e.ts>lastTs)lastTs=e.ts;}});
    // langkah terakhir yang tercapai (urut sesuai FUNNEL_STEPS)
    let lastStepIdx=-1;
    FUNNEL_STEPS.forEach((s,i)=>{if(namesSeen.has(s.key))lastStepIdx=i;});
    return{uid,p,namesSeen,lastTs,lastStepIdx};
  }).filter(Boolean).sort((a,b)=>b.lastStepIdx-a.lastStepIdx||b.lastTs-a.lastTs);

  const rowsHtml=userRows.map(u=>{
    const initials=(u.p.name||'?').charAt(0).toUpperCase();
    const stepBadges=FUNNEL_STEPS.map((s,i)=>{
      const reached=u.namesSeen.has(s.key);
      return`<span title="${esc(s.label)}" style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;font-size:11px;font-weight:700;background:${reached?'rgba(52,211,153,.18)':'rgba(255,255,255,.05)'};color:${reached?'#34D399':'var(--t3)'};border:1px solid ${reached?'rgba(52,211,153,.35)':'var(--border)'};">${reached?'✓':i+1}</span>`;
    }).join('');
    const statusLabel=u.lastStepIdx===-1?'Belum ada aktivitas tercatat':`Terakhir sampai: ${FUNNEL_STEPS[u.lastStepIdx].label}`;
    return`<div class="user-card glass" style="border-radius:var(--r);margin-bottom:8px;">
      <div class="user-head" style="cursor:default;">
        ${u.p.photoURL?`<img class="user-av" src="${esc(u.p.photoURL)}" alt="">`:`<div class="user-av">${initials}</div>`}
        <div class="user-info">
          <div class="user-name">${esc(u.p.name||'Pengguna')}</div>
          <div class="user-email">${esc(u.p.email||u.uid)}</div>
          <div style="font-size:11px;color:${u.lastStepIdx===-1?'var(--t3)':'#34D399'};margin-top:2px;font-weight:600;">${statusLabel}</div>
        </div>
      </div>
      <div style="display:flex;gap:4px;padding:0 14px 13px;flex-wrap:wrap;">${stepBadges}</div>
    </div>`;
  }).join('');
  detWrap.innerHTML+=rowsHtml||'<div class="empty"><div class="em">📭</div><p>Belum ada pengguna dengan data event.</p></div>';
  c.appendChild(detWrap);
}

function uid2color(uid){
  const colors=['rgba(48,209,88,.3)','rgba(96,165,250,.3)','rgba(191,90,242,.3)','rgba(255,159,10,.3)','rgba(255,69,58,.3)'];
  let h=0;for(let i=0;i<uid.length;i++)h=(h*31+uid.charCodeAt(i))%colors.length;
  return colors[h];
}

window.copyUid=function(uid){
  navigator.clipboard?.writeText(uid).then(()=>toast('UID disalin ✓')).catch(()=>toast('Salin manual: '+uid.slice(0,20)+'...'));
};

function buildDrilldown(uid,ud){
  const cats=ud.categories||{};
  const seasons=ud.seasons||{};
  const lahans=ud.lahans||{};
  const perawatan=ud.perawatan||{};

  if(!Object.keys(cats).length)return'<div class="no-data" style="padding:8px 0;">Belum ada kategori.</div>';

  const catIds=Object.keys(cats).sort((a,b)=>(cats[a].order||0)-(cats[b].order||0));
  let html='<div class="drilldown" style="padding:0;">';

  catIds.forEach(catId=>{
    const cat=cats[catId];
    const catSeasons=seasons[catId]||{};
    const seasonIds=Object.keys(catSeasons).sort((a,b)=>(catSeasons[a].order||0)-(catSeasons[b].order||0));

    html+=`<div class="cat-block">
      <div class="cat-hd">
        <span class="cat-hd-ico">${cat.icon||'📦'}</span>
        <span class="cat-hd-name">${esc(cat.name||'—')}</span>
        <span class="cat-hd-cnt">${seasonIds.length} musim</span>
      </div>`;

    if(!seasonIds.length){
      html+='<div class="no-data" style="margin-left:10px;padding:4px 0;">Belum ada musim tanam.</div>';
    }

    seasonIds.forEach(seasonId=>{
      const season=catSeasons[seasonId];
      const seasonLahans=lahans[seasonId]||{};
      const lahanIds=Object.keys(seasonLahans).sort((a,b)=>(seasonLahans[a].order||0)-(seasonLahans[b].order||0));

      html+=`<div class="season-block">
        <div class="season-hd">${esc(season.name||'—')} <span style="font-size:10px;color:var(--t3);font-weight:500;">(${lahanIds.length} lahan)</span></div>`;

      if(!lahanIds.length){
        html+='<div class="no-data">Belum ada lahan.</div>';
      }

      lahanIds.forEach(lahanId=>{
        const l=seasonLahans[lahanId];
        const isAktif=l.tanam&&!l.panen;
        const isPanen=!!l.panen;
        const umur=l.tanam?Math.max(0,Math.floor((new Date()-new Date(l.tanam+'T00:00:00'))/864e5)):null;
        const logs=perawatan[lahanId]||{};
        const logArr=Object.values(logs).sort((a,b)=>b.tanggal?.localeCompare(a.tanggal||'')||0);

        const dotCls=jenis=>{const j=(jenis||'').toLowerCase();return j.includes('semprot')?'lc-g':j.includes('pupuk')?'lc-o':'lc-b';};

        const hasilHtml=(l.berat||l.karung||l.pendapatan)?`
          <div class="lahan-hasil-row">
            ${l.karung?`<div class="lh-box"><div class="lh-box-l">Karung</div><div class="lh-box-v">${l.karung}</div></div>`:''}
            ${l.berat?`<div class="lh-box"><div class="lh-box-l">Berat</div><div class="lh-box-v">${Number(l.berat).toLocaleString('id-ID')} kg</div></div>`:''}
            ${l.pendapatan?`<div class="lh-box"><div class="lh-box-l">Pendapatan</div><div class="lh-box-v">${fmtRp(l.pendapatan)}</div></div>`:''}
          </div>`:'';

        const logHtml=logArr.length?`
          <div class="perawatan-hd">📝 Perawatan <span style="background:rgba(96,165,250,.18);color:var(--blue);padding:1px 6px;border-radius:10px;font-size:9px;">${logArr.length} catatan</span></div>
          ${logArr.slice(0,4).map(log=>`
            <div class="log-compact">
              <div class="lc-dot ${dotCls(log.jenis)}"></div>
              <div>
                <div class="lc-jenis">${esc(log.jenis||'—')}</div>
                <div class="lc-meta">${log.tanggal||'—'}${l.tanam?` · HSS ${Math.max(0,Math.floor((new Date((log.tanggal||'')+'T00:00:00')-new Date(l.tanam+'T00:00:00'))/864e5))}`:''} ${log.catatan?'· '+esc(log.catatan.slice(0,40))+(log.catatan.length>40?'…':''):''}</div>
              </div>
            </div>`).join('')}
          ${logArr.length>4?`<div class="more-logs">+ ${logArr.length-4} catatan lainnya</div>`:''}
        `:'<div class="no-data">Belum ada catatan perawatan.</div>';

        html+=`<div class="lahan-block">
          <div class="lahan-hd-row">
            <div>
              <span class="lahan-hd-name">${esc(l.name||'(tanpa nama)')}</span>
              ${l.luas?`<span class="lahan-hd-luas">📐 ${l.luas} ha</span>`:''}
            </div>
            <span class="lahan-hd-status ${isPanen?'ls-panen':'ls-aktif'}">${isPanen?'✓ Panen':isAktif?`🌱 ${umur} hari`:'Belum tanam'}</span>
          </div>
          <div class="lahan-meta">
            ${l.varietas?`<div class="lahan-meta-item">Varietas: <strong>${esc(l.varietas)}</strong></div>`:''}
            ${l.tanam?`<div class="lahan-meta-item">Tanam: <strong>${l.tanam}</strong></div>`:''}
            ${l.panen?`<div class="lahan-meta-item">Panen: <strong>${l.panen}</strong></div>`:''}
            ${l.pengepul?`<div class="lahan-meta-item">Pengepul: <strong>${esc(l.pengepul)}</strong></div>`:''}
            ${l.harga?`<div class="lahan-meta-item">Harga: <strong>Rp ${Number(l.harga).toLocaleString('id-ID')}/kg</strong></div>`:''}
          </div>
          ${hasilHtml}
          ${logHtml}
        </div>`;
      });

      html+='</div>'; // season-block
    });

    html+='</div>'; // cat-block
  });

  html+='</div>';
  return html;
}

function countSeasons(ud){
  let n=0;
  Object.values(ud.seasons||{}).forEach(cs=>n+=Object.keys(cs).length);
  return n;
}

// ── Active Crops ──────────────────────────
function renderActive(){
  const s=computeStats();
  const c=el('content');
  c.innerHTML='';

  const sec=document.createElement('div');
  sec.innerHTML=`<div class="sec-hd"><span class="sec-title">🌱 Semua Tanaman Aktif</span><span class="sec-badge">${s.totalActive} Lahan</span></div>`;

  if(!s.activeLahans.length){
    const emp=document.createElement('div');
    emp.className='empty';
    emp.innerHTML='<div class="em">🌱</div><p>Belum ada lahan yang sedang aktif (sudah tanam, belum panen) dari semua pengguna.</p>';
    sec.appendChild(emp);
    c.appendChild(sec);
    return;
  }

  // Sort by age descending
  s.activeLahans.sort((a,b)=>hss(b.lahan.tanam)-hss(a.lahan.tanam));

  s.activeLahans.forEach(item=>{
    const{lahan,catName,catIcon,profile}=item;
    const h=hss(lahan.tanam);
    const fase=getFase(h,catName);
    const icoC=catName?.toLowerCase().includes('padi')||catName?.toLowerCase().includes('talas')||catName?.toLowerCase().includes('singkong')?'ci-g':catName?.toLowerCase().includes('jagung')||catName?.toLowerCase().includes('cabai')||catName?.toLowerCase().includes('tomat')?'ci-o':catName?.toLowerCase().includes('bawang')?'ci-p':'ci-d';

    const card=document.createElement('div');
    card.className='crop-card';
    card.style.marginBottom='8px';
    card.innerHTML=`
      <div class="crop-top">
        <div class="crop-ico ${icoC}">${catIcon}</div>
        <div class="crop-meta">
          <div class="crop-origin">${esc(catName)}</div>
          <div class="crop-name-t">${esc(lahan.name||'(tanpa nama)')}</div>
          <div class="crop-owner">👤 ${esc(profile.name||'Pengguna')} · ${esc(profile.email||'—')}</div>
        </div>
        <div class="crop-right">
          <span class="fase-badge ${fase.cls}">${fase.label}</span>
          <div class="crop-age">${h} <span>hari</span></div>
        </div>
      </div>
      <div style="margin-bottom:2px;display:flex;justify-content:space-between;">
        <span style="font-size:9.5px;color:rgba(255,255,255,.35);">Tanam ${lahan.tanam||'—'}</span>
        <span style="font-size:9.5px;color:rgba(255,255,255,.3);">Est. panen ~${Math.max(fase.max-h,0)} hari lagi</span>
      </div>
      <div class="prog-wrap"><div class="prog-fill ${fase.bar}" style="width:${Math.min(fase.pct,100)}%"></div></div>`;
    sec.appendChild(card);
  });
  c.appendChild(sec);
}

// ── getFase (shared with main app) ────────
function getFase(h,catName){
  const nm=(catName||'').toLowerCase();
  if(nm.includes('padi')){
    const max=110;
    if(h<21)return{label:'Vegetatif Awal',cls:'fb-v',bar:'bg-b',pct:Math.round(h/max*100),max};
    if(h<55)return{label:'Vegetatif Aktif',cls:'fb-v',bar:'bg-b',pct:Math.round(h/max*100),max};
    if(h<80)return{label:'Generatif',cls:'fb-g',bar:'bg-p',pct:Math.round(h/max*100),max};
    if(h<95)return{label:'Pengisian Gabah',cls:'fb-b',bar:'bg-o',pct:Math.round(h/max*100),max};
    return{label:'Siap Panen',cls:'fb-p',bar:'bg-g',pct:Math.min(Math.round(h/max*100),98),max};
  }
  if(nm.includes('jagung')){const max=90;if(h<30)return{label:'Vegetatif',cls:'fb-v',bar:'bg-b',pct:Math.round(h/max*100),max};if(h<60)return{label:'Pembungaan',cls:'fb-g',bar:'bg-p',pct:Math.round(h/max*100),max};if(h<80)return{label:'Pengisian Biji',cls:'fb-b',bar:'bg-o',pct:Math.round(h/max*100),max};return{label:'Siap Panen',cls:'fb-p',bar:'bg-g',pct:Math.min(Math.round(h/max*100),98),max};}
  if(nm.includes('cabai')){const max=90;if(h<25)return{label:'Vegetatif',cls:'fb-v',bar:'bg-b',pct:Math.round(h/max*100),max};if(h<50)return{label:'Berbunga',cls:'fb-g',bar:'bg-p',pct:Math.round(h/max*100),max};if(h<75)return{label:'Pembuahan',cls:'fb-b',bar:'bg-o',pct:Math.round(h/max*100),max};return{label:'Panen Bertahap',cls:'fb-p',bar:'bg-g',pct:Math.min(Math.round(h/max*100),98),max};}
  if(nm.includes('tomat')){const max=80;if(h<20)return{label:'Bibit',cls:'fb-v',bar:'bg-b',pct:Math.round(h/max*100),max};if(h<40)return{label:'Vegetatif',cls:'fb-v',bar:'bg-b',pct:Math.round(h/max*100),max};if(h<60)return{label:'Berbunga',cls:'fb-g',bar:'bg-p',pct:Math.round(h/max*100),max};return{label:'Pembuahan',cls:'fb-b',bar:'bg-o',pct:Math.min(Math.round(h/max*100),98),max};}
  if(nm.includes('bawang')){const max=65;if(h<25)return{label:'Vegetatif',cls:'fb-v',bar:'bg-b',pct:Math.round(h/max*100),max};if(h<50)return{label:'Pembentukan Umbi',cls:'fb-g',bar:'bg-p',pct:Math.round(h/max*100),max};return{label:'Siap Panen',cls:'fb-p',bar:'bg-g',pct:Math.min(Math.round(h/max*100),98),max};}
  if(nm.includes('singkong')||nm.includes('ketela')){const max=270;if(h<60)return{label:'Vegetatif Awal',cls:'fb-v',bar:'bg-b',pct:Math.round(h/max*100),max};if(h<150)return{label:'Pembentukan Ubi',cls:'fb-g',bar:'bg-p',pct:Math.round(h/max*100),max};return{label:'Pembesaran Ubi',cls:'fb-b',bar:'bg-o',pct:Math.min(Math.round(h/max*100),98),max};}
  if(nm.includes('talas')){const max=180;if(h<45)return{label:'Vegetatif Awal',cls:'fb-v',bar:'bg-b',pct:Math.round(h/max*100),max};if(h<100)return{label:'Pembentukan Umbi',cls:'fb-g',bar:'bg-p',pct:Math.round(h/max*100),max};return{label:'Pembesaran Umbi',cls:'fb-b',bar:'bg-o',pct:Math.min(Math.round(h/max*100),98),max};}
  const max=90;
  if(h<max*0.4)return{label:'Vegetatif',cls:'fb-v',bar:'bg-b',pct:Math.round(h/max*100),max};
  if(h<max*0.75)return{label:'Generatif',cls:'fb-g',bar:'bg-p',pct:Math.round(h/max*100),max};
  return{label:'Menjelang Panen',cls:'fb-b',bar:'bg-o',pct:Math.min(Math.round(h/max*100),98),max};
}
